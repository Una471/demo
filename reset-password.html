<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | DoBiz Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d2b1f 0%, #1a3a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .reset-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 32px;
            color: #0d2b1f;
        }
        
        .logo span {
            color: #c9a84c;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #c9a84c;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #0d2b1f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
        }
        
        .error {
            color: #e53e3e;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: #fff5f5;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .success {
            color: #38a169;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: #f0fff4;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #c9a84c;
            text-decoration: none;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo">DoBiz<span>Africa</span></div>
        
        <h1>Reset password</h1>
        <div class="subtitle">Enter your email and we'll send you a reset link</div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <input type="email" id="email" placeholder="Email address">
        
        <button onclick="sendResetLink()">Send Reset Link →</button>
        
        <div class="back-link">
            <a href="/login.html">← Back to sign in</a>
        </div>
    </div>
    
    <script>
        async function sendResetLink() {
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!email) {
                errorDiv.textContent = 'Please enter your email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/update-password.html'
            });
            
            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } else {
                successDiv.textContent = 'Reset link sent! Check your email.';
                successDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
