<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Comparison | DoBiz Africa</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #0C2340;
  --teal: #00C896;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f7fa;
  color: #1a2a3a;
}

/* Navigation */
.nav-top {
  background: var(--navy);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--teal);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--navy);
  font-size: 1.1em;
}
.logo-text {
  font-weight: 700;
  color: white;
  font-size: 1.1em;
}
.logo-text span { color: var(--teal); }
.nav-links {
  display: flex;
  gap: 4px;
  align-items: center;
}
.nav-links a {
  padding: 8px 14px;
  border-radius: 8px;
  text-decoration: none;
  color: rgba(255,255,255,0.7);
  font-size: 0.875em;
  font-weight: 500;
  transition: all 0.2s;
}
.nav-links a:hover,
.nav-links a.active {
  color: white;
  background: rgba(255,255,255,0.1);
}
.nav-links a.active {
  color: var(--teal);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-avatar {
  width: 32px;
  height: 32px;
  background: var(--teal);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--navy);
}
.user-name {
  color: white;
  font-size: 0.875em;
}
.logout-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.75em;
}
.logout-btn:hover {
  background: rgba(255,255,255,0.25);
}

/* Loading Overlay */
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.loading-spinner {
  background: white;
  padding: 20px 30px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid #e2e8f0;
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Hero */
.hero {
  background: linear-gradient(135deg, #0C2340 0%, #1A3A5C 100%);
  padding: 48px 24px;
  text-align: center;
}
.hero h1 {
  font-size: 2.2em;
  color: white;
  margin-bottom: 8px;
}
.hero p {
  color: rgba(255,255,255,0.6);
  font-size: 1em;
  max-width: 600px;
  margin: 0 auto;
}

/* Iframe Container */
.iframe-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
  min-height: 600px;
}
.iframe-container iframe {
  width: 100%;
  height: 800px;
  border: none;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay" style="display: none;">
  <div class="loading-spinner">
    <div class="spinner"></div>
    <span>Loading...</span>
  </div>
</div>

<nav class="nav-top">
  <div class="nav-inner">
    <a href="/" class="logo">
      <div class="logo-icon">D</div>
      <div class="logo-text">DoBiz<span>Africa</span></div>
    </a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/insurance/">Insurance</a>
      <a href="/rates/">Rates</a>
      <a href="/network/" class="active">Network</a>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">U</div>
      <span class="user-name" id="userName">User</span>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>Compare Mobile Networks</h1>
  <p>Find the best network for your needs — compare Orange, Mascom, and BTC based on real user reviews.</p>
</div>

<div class="iframe-container">
  <iframe src="https://network-comparison.streamlit.app/" title="Network Comparison Tool"></iframe>
</div>

<script>
// ========== SUPABASE CONFIGURATION ==========
const SUPABASE_URL = 'https://ribrhjtyiovcjofwcewc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpYnJoanR5aW92Y2pvZndjZXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTkyNjIsImV4cCI6MjA4ODU3NTI2Mn0.IyKQs_ZS-FBVsed5ET62qyY04tLoAhD3wCXE_HTxKKc';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { autoRefreshToken: true, persistSession: true }
});

let currentUser = null;

async function checkSession() {
  const loadingOverlay = document.getElementById('loadingOverlay');
  loadingOverlay.style.display = 'flex';
  
  const { data: { session }, error } = await sb.auth.getSession();
  
  if (error || !session) {
    window.location.href = 'https://app.dobusiness.africa';
    return false;
  }
  
  currentUser = session.user;
  const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
  const initial = name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = initial;
  
  loadingOverlay.style.display = 'none';
  return true;
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = 'https://app.dobusiness.africa';
}

// Initialize
checkSession();
</script>
</body>
</html>
