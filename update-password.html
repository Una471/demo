<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password | DoBiz Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d2b1f 0%, #1a3a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .update-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 32px;
            color: #0d2b1f;
        }
        
        .logo span {
            color: #c9a84c;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #c9a84c;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #0d2b1f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
        }
        
        .error {
            color: #e53e3e;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: #fff5f5;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .success {
            color: #38a169;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: #f0fff4;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="update-card">
        <div class="logo">DoBiz<span>Africa</span></div>
        
        <h1>Set new password</h1>
        <div class="subtitle">Enter your new password below</div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <input type="password" id="newPassword" placeholder="New password (min. 6 characters)">
        <input type="password" id="confirmPassword" placeholder="Confirm password">
        
        <button onclick="updatePassword()">Update Password →</button>
    </div>
    
    <script>
        async function updatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!newPassword || !confirmPassword) {
                errorDiv.textContent = 'Please fill in both fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (newPassword.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            const { data, error } = await sb.auth.updateUser({ password: newPassword });
            
            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } else {
                successDiv.textContent = 'Password updated successfully! Redirecting to login...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            }
        }
    </script>
</body>
</html>
