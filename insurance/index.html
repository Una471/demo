<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Insurance | DoBiz Africa</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* ========== INSURANCE TOOL STYLES ========== */
:root {
  --navy: #0A1628;
  --navy-mid: #122040;
  --teal: #00C896;
  --teal-dark: #00A87E;
  --gold: #F5A623;
  --white: #FFFFFF;
  --off-white: #F7F9FC;
  --border: #E2E8F0;
  --text-dark: #0A1628;
  --text-mid: #4A5568;
  --text-light: #718096;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--off-white); color: var(--text-dark); }

/* Navigation */
.nav-top {
  background: var(--navy);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--teal);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--navy);
  font-size: 1.1em;
}
.logo-text {
  font-weight: 700;
  color: white;
  font-size: 1.1em;
}
.logo-text span { color: var(--teal); }
.nav-links {
  display: flex;
  gap: 4px;
  align-items: center;
}
.nav-links a {
  padding: 8px 14px;
  border-radius: 8px;
  text-decoration: none;
  color: rgba(255,255,255,0.7);
  font-size: 0.875em;
  font-weight: 500;
  transition: all 0.2s;
}
.nav-links a:hover,
.nav-links a.active {
  color: white;
  background: rgba(255,255,255,0.1);
}
.nav-links a.active {
  color: var(--teal);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-avatar {
  width: 32px;
  height: 32px;
  background: var(--teal);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--navy);
}
.user-name {
  color: white;
  font-size: 0.875em;
}
.logout-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.75em;
}
.logout-btn:hover {
  background: rgba(255,255,255,0.25);
}

/* Hero */
.hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 48px 24px;
}
.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
}
.hero h1 {
  font-size: 2.2em;
  color: white;
  margin-bottom: 8px;
}
.hero p {
  color: rgba(255,255,255,0.6);
  font-size: 1em;
  max-width: 600px;
}

/* Main */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Loading Overlay */
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.loading-spinner {
  background: white;
  padding: 20px 30px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid #e2e8f0;
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay" style="display: none;">
  <div class="loading-spinner">
    <div class="spinner"></div>
    <span>Loading...</span>
  </div>
</div>

<nav class="nav-top">
  <div class="nav-inner">
    <a href="/" class="logo">
      <div class="logo-icon">D</div>
      <div class="logo-text">DoBiz<span>Africa</span></div>
    </a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/insurance/" class="active">Insurance</a>
      <a href="/rates/">Rates</a>
      <a href="/network/">Network</a>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">U</div>
      <span class="user-name" id="userName">User</span>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1>Compare Insurance Plans</h1>
    <p>Find the best medical aid, life insurance, funeral cover, and more. Compare plans from Botswana's top insurers side by side.</p>
  </div>
</div>

<div class="main">
  <div id="insuranceContainer">
    <!-- Insurance tool will load here -->
    <div class="text-center py-5">
      <div class="spinner"></div>
      <p class="mt-3">Loading insurance plans...</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>

<script>
// ========== SUPABASE CONFIGURATION ==========
const SUPABASE_URL = 'https://ribrhjtyiovcjofwcewc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpYnJoanR5aW92Y2pvZndjZXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTkyNjIsImV4cCI6MjA4ODU3NTI2Mn0.IyKQs_ZS-FBVsed5ET62qyY04tLoAhD3wCXE_HTxKKc';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { autoRefreshToken: true, persistSession: true }
});

// ========== SESSION CHECK ==========
let currentUser = null;

async function checkSession() {
  const loadingOverlay = document.getElementById('loadingOverlay');
  loadingOverlay.style.display = 'flex';
  
  const { data: { session }, error } = await sb.auth.getSession();
  
  if (error || !session) {
    window.location.href = 'https://app.dobusiness.africa';
    return false;
  }
  
  currentUser = session.user;
  const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
  const initial = name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = initial;
  
  loadingOverlay.style.display = 'none';
  return true;
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = 'https://app.dobusiness.africa';
}

// ========== INSURANCE TOOL CODE ==========
// This is your existing insurance tool logic
// I'm embedding the essential parts here, but you should include your full app-enhanced.js

const AIRTABLE_TOKEN = 'pat7Sw46TM6odnPkw.2572382d8cc48c9f76857668ec48921006c9c0c1e4c815d882d60140209be6f6';
const AIRTABLE_BASE_ID = 'appyCd1RKcaY8q1We';
const PRODUCTS_TABLE = 'Products';

let allProducts = [];

async function loadProducts() {
  const container = document.getElementById('insuranceContainer');
  container.innerHTML = '<div class="text-center py-5"><div class="spinner"></div><p>Loading plans...</p></div>';
  
  try {
    const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${PRODUCTS_TABLE}?sort%5B0%5D%5Bfield%5D=ID`;
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` } });
    const data = await res.json();
    
    allProducts = data.records.map(record => ({
      id: record.fields.ID || record.id,
      name: record.fields.Name || '',
      category: record.fields.Category || '',
      company: record.fields['Company Name'] || 'Insurer',
      affiliate_link: record.fields['Affiliate Link'] || null
    }));
    
    renderProducts();
  } catch (err) {
    container.innerHTML = '<div class="alert alert-danger">Failed to load insurance plans. Please refresh.</div>';
  }
}

function renderProducts() {
  const container = document.getElementById('insuranceContainer');
  
  if (!allProducts.length) {
    container.innerHTML = '<div class="alert alert-info">No insurance plans available yet.</div>';
    return;
  }
  
  const categories = {};
  allProducts.forEach(p => {
    if (!categories[p.category]) categories[p.category] = [];
    categories[p.category].push(p);
  });
  
  let html = '<div class="row">';
  
  Object.keys(categories).forEach(cat => {
    html += `
      <div class="col-12 mb-4">
        <h3 class="mb-3">${cat || 'Other'} Plans</h3>
        <div class="row">
    `;
    
    categories[cat].forEach(product => {
      html += `
        <div class="col-md-4 col-lg-3 mb-3">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">${product.name}</h5>
              <p class="card-text text-muted">${product.company}</p>
              ${product.affiliate_link ? 
                `<button class="btn btn-primary w-100" onclick="window.open('${product.affiliate_link}', '_blank')">Get Quote →</button>` :
                `<button class="btn btn-outline-secondary w-100" disabled>Coming Soon</button>`
              }
            </div>
          </div>
        </div>
      `;
    });
    
    html += `</div></div>`;
  });
  
  html += '</div>';
  container.innerHTML = html;
}

// ========== INITIALIZATION ==========
(async function init() {
  const loggedIn = await checkSession();
  if (loggedIn) {
    await loadProducts();
  }
})();
</script>
</body>
</html>
