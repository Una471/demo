<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | DoBiz Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d2b1f 0%, #1a3a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 32px;
            color: #0d2b1f;
        }
        
        .logo span {
            color: #c9a84c;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #c9a84c;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #0d2b1f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
        }
        
        button.google {
            background: white;
            color: #333;
            border: 2px solid #e2e8f0;
        }
        
        button.google:hover {
            background: #f8f9fa;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #718096;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e2e8f0;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .divider span {
            background: white;
            padding: 0 12px;
            position: relative;
            z-index: 1;
        }
        
        .error {
            color: #e53e3e;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: #fff5f5;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .success {
            color: #38a169;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: #f0fff4;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }
        
        .footer-links a {
            color: #c9a84c;
            text-decoration: none;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">DoBiz<span>Africa</span></div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <button class="google" onclick="loginWithGoogle()">
            🔐 Continue with Google
        </button>
        
        <div class="divider"><span>or sign in with email</span></div>
        
        <input type="email" id="email" placeholder="Email address">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="loginWithEmail()">Sign In →</button>
        
        <div class="footer-links">
            <a href="#" onclick="switchToReset()">Forgot password?</a>
        </div>
        
        <div class="footer-links" style="margin-top: 20px;">
            Don't have an account? <a href="#" onclick="switchToSignup()">Create one</a>
        </div>
    </div>
    
    <script>
        async function loginWithEmail() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            
            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } else {
                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
                window.location.href = redirect;
            }
        }
        
        async function loginWithGoogle() {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + redirect }
            });
            
            if (error) {
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        }
        
        function switchToReset() {
            window.location.href = '/reset-password.html';
        }
        
        function switchToSignup() {
            window.location.href = '/signup.html';
        }
    </script>
</body>
</html>
